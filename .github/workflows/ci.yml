name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          shellcheck --exclude=SC1091 \
            bin/orchd \
            lib/core.sh \
            lib/runner.sh \
            lib/cmd/init.sh \
            lib/cmd/plan.sh \
            lib/cmd/spawn.sh \
            lib/cmd/board.sh \
            lib/cmd/check.sh \
            lib/cmd/merge.sh \
            tests/smoke.sh

  test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Make scripts executable
        run: chmod +x bin/orchd tests/smoke.sh
      - name: Run smoke tests
        run: ./tests/smoke.sh
