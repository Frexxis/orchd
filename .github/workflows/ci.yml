name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          shellcheck --exclude=SC1091 \
            bin/orchd \
            lib/core.sh \
            lib/runner.sh \
            lib/cmd/init.sh \
            lib/cmd/plan.sh \
            lib/cmd/spawn.sh \
            lib/cmd/board.sh \
            lib/cmd/check.sh \
            lib/cmd/merge.sh \
            lib/cmd/doctor.sh \
            lib/cmd/refresh_docs.sh \
            lib/cmd/review.sh \
            lib/cmd/autopilot.sh \
            lib/cmd/resume.sh \
            lib/cmd/state.sh \
            lib/cmd/await.sh \
            lib/cmd/memory.sh \
            lib/cmd/idea.sh \
            lib/cmd/fleet.sh \
            tests/config_get.sh \
            tests/smoke.sh

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            brew install tmux
          fi
      - name: Make scripts executable
        run: chmod +x bin/orchd tests/config_get.sh tests/smoke.sh
      - name: Run config_get regression tests
        run: ./tests/config_get.sh
      - name: Run smoke tests
        run: ./tests/smoke.sh
